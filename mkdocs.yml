site_name: pyhmfd
site_description: Read Human Mortality Database and Human Fertility Database data from the web
site_url: https://filipeclduarte.github.io/pyhmfd
repo_url: https://github.com/filipeclduarte/pyhmfd
repo_name: filipeclduarte/pyhmfd

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
  - User Guide:
    - Human Mortality Database: hmd.md
    - Human Fertility Database: hfd.md
    - Multi-country Download: multi-country.md
    - Other Databases: other-databases.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
